<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NovaChat AI</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            🤖 NovaChat
        </div>

        <button class="new-chat" onclick="newChat()">
            ＋ New Chat
        </button>

        <div class="history" id="history">
        </div>

    </aside>


    <!-- Main Chat -->
    <main class="chat">

        <header class="header">

            <h1>
                NovaChat AI
            </h1>

        </header>


        <section class="messages" id="messages">

            <div class="message bot">
                👋 Hello! I'm NovaChat AI.
                <br>
                Ask me anything!
            </div>

        </section>


        <div class="input-area">

            <input
                id="input"
                type="text"
                placeholder="Message NovaChat..."
                autocomplete="off"
            >

            <button onclick="sendMessage()">
                ➤
            </button>

        </div>


    </main>

</div>


<script src="script.js"></script>

</body>

</html>
